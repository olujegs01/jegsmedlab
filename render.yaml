services:
  - type: web
    name: jegsmedlab-backend
    env: python
    region: ohio
    plan: free
    runtime: python3.11
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      # IMPORTANT: Set this ONCE in the Render dashboard and never change it.
      # Using generateValue: true re-generates the key on every deploy, invalidating all user sessions.
      # Set it manually in the Render dashboard: Settings → Environment → SECRET_KEY = <long-random-string>
      - key: SECRET_KEY
        sync: false
      # Allow all Vercel deployments (preview + production) and localhost
      # The backend also supports allow_origin_regex for *.vercel.app automatically
      - key: CORS_ORIGINS
        value: https://jegsmedlab.vercel.app,http://localhost:3000,http://localhost:3001
      - key: ANONYMIZED_TELEMETRY
        value: "False"
      # DATABASE_URL — set this in the Render dashboard to your PostgreSQL Internal Database URL
      # e.g. postgres://jegsmedlab:password@dpg-xxxxxx-a/jegsmedlab
      # Falls back to SQLite (ephemeral) if not set.
      - key: DATABASE_URL
        sync: false
      - key: CHROMA_DB_PATH
        value: ./chroma_db
